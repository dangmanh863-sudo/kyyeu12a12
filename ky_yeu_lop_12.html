<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kỷ yếu lớp 12</title>

<style>
/* ===== MENU MOBILE ===== */

#menu-toggle {
    display: none;
    font-size: 1.6rem;
    background: none;
    border: none;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {

    #menu-toggle {
        display: block;
    }

    .nav-links {
        position: fixed;
        top: 70px;
        right: 0;
        width: 220px;
        height: calc(100vh - 70px);
        background: white;
        flex-direction: column;
        padding: 20px;
        gap: 20px;
        transform: translateX(100%);
        transition: 0.3s ease;
        box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        z-index: 999;
    }

    .nav-links.show {
        transform: translateX(0);
    }

    .nav-links a {
        font-size: 1.1rem;
    }
}

/* DARK MODE SUPPORT */
body.dark .nav-links {
    background: #1a1a2e;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;scroll-behavior:smooth;}

body{
background: radial-gradient(circle at top, #0f172a, #020617);
color:#e2e8f0;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:9999;
background:black;
}

#intro video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.5) blur(2px);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, transparent 30%, black 100%);
}

#flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

#particles{
position:absolute;
width:100%;
height:100%;
}

.intro-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

.logo{
font-size:70px;
letter-spacing:6px;
animation:zoomIn 2s ease;
text-shadow:0 0 20px #5b6cff;
}

.tagline{
opacity:0;
margin-top:10px;
animation:fadeIn 2s forwards;
animation-delay:1.5s;
}

.intro-content button{
margin-top:30px;
padding:12px 30px;
border:none;
background:#5b6cff;
color:white;
border-radius:8px;
cursor:pointer;
}

header{
position:fixed;
width:100%;
top:0;
background:rgba(15,23,42,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
padding:15px 40px;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

.page{
display:none;
padding:100px 10%;
}

.active{display:block;}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
}

.parallax{
position:absolute;
width:100%;
height:120%;
background:url("https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=1600") center/cover;
z-index:-2;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

.students{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.student{
background:rgba(30,41,59,0.7);
padding:10px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.student:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 20px #5b6cff;
}

@keyframes zoomIn{
0%{transform:scale(0.5);opacity:0}
100%{transform:scale(1);opacity:1}
}
@keyframes fadeIn{
to{opacity:1}
}
</style>
</head>

<body>

<div id="intro">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-clouds-and-sun-1573/1080p.mp4">
</video>
<div class="overlay"></div>
<div class="intro-content">
<h1 class="logo">🎓 CLASS 12</h1>
<p class="tagline">A Journey To Remember</p>
<button onclick="enter()">ENTER</button>
</div>
</div>

<header>
<nav>
<h3>Kỷ yếu 12A</h3>
<ul>
<li onclick="go('home')">Trang chủ</li>
<li onclick="go('students')">Học sinh</li>
</ul>
</nav>
</header>

<section id="home" class="page active">
<div class="hero">
<div class="parallax"></div>
<div>
<h1>Class 12 Yearbook</h1>
<p>Where memories last forever</p>
</div>
</div>
</section>

<section id="students" class="page">
<h2>36 học sinh</h2>
<div class="students" id="list"></div>
</section>

<script>
function enter(){
document.getElementById("intro").style.display="none";
}

function go(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

let studentsData=[]
for(let i=1;i<=36;i++){
studentsData.push({
name:"Học sinh "+i,
img:"https://picsum.photos/200?random="+i
})
}

let list=document.getElementById("list")
studentsData.forEach(s=>{
list.innerHTML+=`
<div class="student">
<img src="${s.img}" width="100%">
<p>${s.name}</p>
</div>`
})
</script>
<script>
const menuBtn = document.getElementById("menu-toggle");
const navLinks = document.querySelector(".nav-links");

menuBtn.onclick = () => {
    navLinks.classList.toggle("show");
};

// tự đóng menu khi click link
document.querySelectorAll(".nav-links a").forEach(link => {
    link.onclick = () => {
        navLinks.classList.remove("show");
    };
});
</script>
</body>
</html>
