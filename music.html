<!DOCTYPE html>
<html>
<body>
<audio autoplay loop>
    <source src="https://popular-pink-wtzs7lcfpi.edgeone.app/Low%20G%20In%20Love%20(ft.%20JustaTee)%20‘L2K’%20The%20Album.mp3" type="audio/mpeg">
</audio>
<script>
const music = document.getElementById("bg-music");

// lưu trạng thái
music.onplay = () => localStorage.setItem("music", "on");
music.onpause = () => localStorage.setItem("music", "off");

// load lại
window.onload = () => {
    if (localStorage.getItem("music") === "on") {
        music.play();
    }
};
</script>
</body>
</html>
