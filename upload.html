<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG

    projectId: "a12-4484a",

};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

// 🚀 UPLOAD ẢNH
window.upload = async function () {
    const name = document.getElementById("name").value;
    const file = document.getElementById("imgFile").files[0];
    const caption = document.getElementById("caption").value;

    if (!file) {
        alert("Chọn ảnh đi!");
        return;
    }

    try {
        const storageRef = ref(storage, "images/" + Date.now() + "_" + file.name);

        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);

        await addDoc(collection(db, "gallery"), {
            name,
            caption,
            img: url,
            time: Date.now()
        });

        alert("Đăng thành công 🔥");
        render();

    } catch (err) {
        console.error(err);
        alert("Lỗi upload!");
    }
};

// 📸 LOAD ẢNH
async function render() {
    const gallery = document.getElementById("gallery");

    const q = query(collection(db, "gallery"), orderBy("time", "desc"));
    const snap = await getDocs(q);

    let html = "";

    snap.forEach(doc => {
        const item = doc.data();
        html += `
        <div class="img-card">
            <img src="${item.img}">
            <p><b>${item.name || "Ẩn danh"}</b><br>${item.caption || ""}</p>
        </div>
        `;
    });

    gallery.innerHTML = html;
}

render();

</script>

    <script>
        (function () {
        const STORAGE_KEY = '12A12_msgs';
        const themeToggle = document.getElementById('theme-toggle');
        const guestForm = document.getElementById('guestbook-form');
        const messageList = document.getElementById('message-list');

        function escapeHTML(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function loadMessages() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        }

        function saveMessages(messages) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages.slice(0, 100)));
        }

        function renderMessages() {
            const messages = loadMessages();
            if (!messageList) return;

            if (messages.length === 0) {
                messageList.innerHTML = '<div class="msg-card"><p>Chưa có lời chúc nào. Hãy là người đầu tiên để lại kỷ niệm nhé!</p></div>';
                return;
            }

            messageList.innerHTML = messages.map((m, idx) => `
                <div class="msg-card">
                    <div class="msg-header">
                        <h4>${escapeHTML(m.name)}</h4>
                        <button type="button" class="msg-delete" data-index="${idx}" aria-label="Xóa lời chúc">✕</button>
                    </div>
                    <p>"${escapeHTML(m.text)}"</p>
                    <small>${escapeHTML(m.date)}</small>
                </div>
            `).join('');
        }

        function addMessage(event) {
            event.preventDefault();
            if (!guestForm) return;

            const nameInput = document.getElementById('guest-name');
            const msgInput = document.getElementById('guest-msg');
            const name = (nameInput?.value || '').trim();
            const text = (msgInput?.value || '').trim();

            if (!name || !text) {
                alert('Vui lòng nhập đủ tên và lời chúc nha!');
                return;
            }

            const messages = loadMessages();
            messages.unshift({
                name,
                text,
                date: new Date().toLocaleString('vi-VN')
            });

            saveMessages(messages);
            renderMessages();

            if (nameInput) nameInput.value = '';
            if (msgInput) msgInput.value = '';
        }

        function deleteMessage(index) {
            const messages = loadMessages();
            if (index < 0 || index >= messages.length) return;
            messages.splice(index, 1);
            saveMessages(messages);
            renderMessages();
        }

        function setTheme(mode) {
            document.body.classList.toggle('dark', mode === 'dark');
            localStorage.setItem('12A12_theme', mode);
            if (themeToggle) {
                themeToggle.innerText = mode === 'dark' ? '☀️' : '🌙';
                themeToggle.setAttribute('aria-label', mode === 'dark' ? 'Chuyển sang chế độ sáng' : 'Chuyển sang chế độ tối');
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('12A12_theme');
            if (saved === 'dark' || saved === 'light') {
                setTheme(saved);
                return;
            }
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            setTheme(prefersDark ? 'dark' : 'light');
        }

        function handleThemeToggle() {
            const isDark = document.body.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
        }

        if (guestForm) {
            guestForm.addEventListener('submit', addMessage);
        }

        if (messageList) {
            messageList.addEventListener('click', (event) => {
                const button = event.target.closest('.msg-delete');
                if (!button) return;
                const index = Number(button.dataset.index);
                if (!Number.isNaN(index)) deleteMessage(index);
            });
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', handleThemeToggle);
        }

        renderMessages();
        initTheme();

        function createPetals() {
            if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                return;
            }
            const container = document.getElementById('petals');
            if (!container) return;
            const count = 18;

            for (let i = 0; i < count; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 4 + 5) + 's';
                petal.style.animationDelay = (Math.random() * 5) + 's';
                petal.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(petal);
            }
        }

        createPetals();
        AOS.init({ duration: 1000, once: true });
    })();
    </script>
